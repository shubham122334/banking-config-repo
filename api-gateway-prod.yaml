
srping:
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - name: RequestRateLimiter
              args:
                radis-rate-limiter.replenishRate: 5
                radis-rate-limiter.brustCapacity: 10
          routes:
            - id: account-service
              uri: lb://acounts-service
              predicates:
                - path=/api/account/**
              filters:
                - StripPrefix=1
            - id: transaction-service
              uri: lb://transaction
              predicates:
                - path=/api/transaction/**
                - name: CircuitBreaker
                  args:
                    name: transactionCB
              filters:
                - StripPrefix=1
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info, metrics
